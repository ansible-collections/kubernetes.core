---
name: Linters

on: [workflow_call]

jobs:
  linters:
    uses: ansible-network/github_actions/.github/workflows/tox-linters.yml@main
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run-ansible-lint
        uses: ansible/ansible-lint@main
        with:
          gh_action_ref: "v25.5.0"
